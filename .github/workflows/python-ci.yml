name: python-ci

on:
  push:
    branches: [master]
    paths:
      - "python/**"
      - "docs/contract.json"
      - ".github/workflows/python-ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "python/**"
      - "docs/contract.json"
      - ".github/workflows/python-ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/pyproject.toml
      - run: python -m pip install -e './python[dev]'
      - if: matrix.python-version == '3.11'
        run: ruff format --check python
      - if: matrix.python-version == '3.11'
        run: ruff check python
      - if: matrix.python-version == '3.11'
        working-directory: python
        run: pyright
      - run: pytest python/tests

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install build twine
      - working-directory: python
        run: python -m build
      - working-directory: python
        run: twine check dist/*
      - run: python -m pip install --force-reinstall --no-deps python/dist/*.whl
      - run: python -c "import unio; from unio import Agent, AgentError, Session, Stream; assert unio.__version__ == '0.1.0'"
      - run: python -m pip install --force-reinstall --no-deps python/dist/*.tar.gz
      - run: python -c "import unio; assert unio.__version__ == '0.1.0'"
