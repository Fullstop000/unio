name: python-release

on:
  push:
    tags:
      - "python-v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify tagged commit is on master
        run: |
          git fetch origin master:refs/remotes/origin/master
          git merge-base --is-ancestor "$GITHUB_SHA" origin/master
      - run: python -m pip install -e './python[dev]'
      - name: Verify tag matches package version
        working-directory: python
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          test "$TAG" = "python-v$VERSION"
          grep -E "^## $VERSION - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md
      - run: ruff format --check python
      - run: ruff check python
      - working-directory: python
        run: pyright
      - run: pytest python/tests
      - working-directory: python
        run: python -m build
      - working-directory: python
        run: twine check dist/*
      - run: python -m pip install --force-reinstall --no-deps python/dist/*.whl
      - name: Verify built public API
        env:
          TAG: ${{ github.ref_name }}
        run: python -c "import os, unio; from unio import Agent, AgentError, Session, Stream; assert unio.__version__ == os.environ['TAG'].removeprefix('python-v')"
      - uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: python/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
